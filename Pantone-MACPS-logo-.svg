<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 1024 1024"
  role="img"
  aria-labelledby="title"
>
  <title id="title">MACPS logo</title>

  <!--
    To match the original logo EXACTLY, this SVG simply embeds
    the existing MACPS.png artwork without any distortion.
    The square viewBox prevents Google and browsers from stretching it.
  -->
  <image
    x="0"
    y="0"
    width="1024"
    height="1024"
    xlink:href="MACPS.png"
    preserveAspectRatio="xMidYMid meet"
  />
</svg>



